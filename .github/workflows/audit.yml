name: Security audit

on:
  schedule:
    - cron: "0 0 * * 0"
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - uses: actions-rs/audit-check@v1
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
